<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{width:100%;height:100%;overflow:hidden;font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#060810;color:#e0e4f0}
.offline{display:flex;align-items:center;justify-content:center;height:100vh;text-align:center}
.card{background:rgba(22,28,48,0.95);border:1px solid rgba(99,102,241,0.25);border-radius:20px;padding:44px 52px;max-width:480px}
.card .icon{font-size:3.5rem;margin-bottom:16px}
.card h1{font-size:1.6rem;color:#818cf8;margin-bottom:8px}
.card .sub{font-size:.9rem;color:#9ca3af;margin-bottom:28px;line-height:1.6}
.card .steps{text-align:left;background:rgba(15,20,40,0.8);border-radius:12px;padding:20px 24px;margin-bottom:20px}
.card .steps p{font-size:.78rem;color:#a5b4fc;line-height:2.2}
.card .steps span{display:inline-block;width:20px;height:20px;background:#6366f1;color:#fff;border-radius:50%;text-align:center;line-height:20px;font-size:.7rem;margin-right:8px}
.card .link{font-size:.75rem;color:#6366f1;word-break:break-all;margin-top:12px}
.card .status{font-size:.7rem;color:#4b5563;margin-top:16px}
.card .dot{display:inline-block;width:6px;height:6px;background:#ef4444;border-radius:50%;animation:blink 2s infinite;margin-right:6px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="offline">
  <div class="card">
    <div class="icon">📊</div>
    <h1>Token Monitor</h1>
    <p class="sub">实时监控 DeepSeek API Token 消耗</p>
    <div class="steps">
      <p><span>1</span>运行一次 <b>setup.bat</b></p>
      <p><span>2</span>打开 <b>localhost:3000</b> 配置 DeepSeek API</p>
      <p><span>3</span>壁纸自动跳转完整界面</p>
    </div>
    <p class="link">github.com/RichardDou88/deepseek-token-monitor/releases/latest</p>
    <div class="status"><span class="dot"></span>等待后端连接...（每5秒自动重试）</div>
  </div>
</div>
<script>
(function check(){
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'http://localhost:3000/api/providers', true);
  xhr.timeout = 3000;
  xhr.onload = function() {
    if (xhr.status === 200) {
      window.location.replace('http://localhost:3000/wallpaper');
    }
  };
  xhr.onerror = xhr.ontimeout = function() {};
  setTimeout(check, 5000);
})();
</script>
</body>
</html>
