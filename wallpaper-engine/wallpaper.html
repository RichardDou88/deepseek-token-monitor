<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{width:100%;height:100%;overflow:hidden;font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#060810;color:#e0e4f0}
.offline{display:flex;align-items:center;justify-content:center;height:100vh;text-align:center}
.card{background:rgba(22,28,48,0.9);border:1px solid rgba(99,102,241,0.2);border-radius:16px;padding:40px 48px;max-width:460px}
.card .icon{font-size:3rem;margin-bottom:12px}
.card h1{font-size:1.5rem;color:#818cf8;margin-bottom:6px}
.card .sub{font-size:.85rem;color:#6b7280;margin-bottom:24px}
.card .info{font-size:.75rem;color:#9ca3af;line-height:1.8}
.card .info b{color:#a5b4fc}
.card .status{font-size:.7rem;color:#4b5563;margin-top:20px}
.card .dot{display:inline-block;width:6px;height:6px;background:#ef4444;border-radius:50%;animation:blink 2s infinite;margin-right:6px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="offline">
  <div class="card">
    <div class="icon">📊</div>
    <h1>DeepSeek Token Monitor</h1>
    <p class="sub">后端服务未启动</p>
    <div class="info">
      <p>请查看 <b>GitHub README</b> 配置后端：</p>
      <p style="color:#6366f1;margin:8px 0">github.com/RichardDou88/deepseek-token-monitor</p>
      <p>或查看 <b>Steam Workshop 页面描述</b></p>
    </div>
    <div class="status"><span class="dot"></span> 等待后端连接...（每5秒自动重试）</div>
  </div>
</div>
<script>
(function check(){
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'http://localhost:3000/api/providers', true);
  xhr.timeout = 3000;
  xhr.onload = function() {
    if (xhr.status === 200) {
      window.location.replace('http://localhost:3000/wallpaper');
    }
  };
  xhr.onerror = xhr.ontimeout = function() {};
  setTimeout(check, 5000);
})();
</script>
</body>
</html>
